<!-- @dsCard group="Colors" viewport="700x150" name="Ink ramp" subtitle="Warm near-black → faint metadata" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 22px 24px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: var(--radius-1); }
  .nm { font-family: var(--font-serif); font-variant: small-caps; letter-spacing: .06em; font-size: .74rem; color: var(--text-body); margin-top: 7px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="nm">900</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="nm">700</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="nm">500</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><div class="nm">400</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-300)"></div><div class="nm">300</div></div>
  </div>
</body>
</html>
