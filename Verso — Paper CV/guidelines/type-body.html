<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 26px 32px; }
  .lead { font-family: var(--font-serif); font-style: italic; font-size: var(--fs-lead); line-height: 1.6; color: var(--text-body); margin: 0 0 14px; max-width: 58ch; }
  .body { font-family: var(--font-serif); font-size: var(--fs-body); line-height: var(--lh-body); color: var(--text-body); margin: 0; max-width: 62ch; }
  .body strong { color: var(--text-strong); }
  .body a { color: var(--link); }
</style>
</head>
<body>
  <p class="lead">For twenty years I have set metal type by hand, one slug at a time.</p>
  <p class="body">My work lives at the seam between <strong>craft and legibility</strong>. I restore nineteenth-century presses, cut new faces from old specimens, and teach the slow discipline of <a href="#">letterpress</a> to a new generation of printers.</p>
</body>
</html>
