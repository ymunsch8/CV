<!-- @dsCard group="Colors" viewport="700x180" name="Semantic roles" subtitle="Text & surface aliases on stock" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-sunken); padding: 22px 24px; }
  .sheet { background: var(--surface-page); box-shadow: var(--shadow-raise); border-radius: var(--radius-1); padding: 18px 20px; }
  .strong { font-family: var(--font-display); font-size: 1.5rem; color: var(--text-strong); font-weight:600; }
  .body { font-family: var(--font-serif); font-size: 1rem; color: var(--text-body); margin: 4px 0; }
  .muted { font-family: var(--font-serif); font-size: .9rem; color: var(--text-muted); }
  .faint { font-family: var(--font-serif); font-size: .82rem; color: var(--text-faint); }
  .link { color: var(--link); }
</style>
</head>
<body>
  <div class="sheet">
    <div class="strong">text-strong · the masthead</div>
    <div class="body">text-body — the workhorse for running copy and entries.</div>
    <div class="muted">text-muted — supporting notes and secondary labels.</div>
    <div class="faint">text-faint — dates, metadata, captions · <a class="link" href="#">link</a></div>
  </div>
</body>
</html>
