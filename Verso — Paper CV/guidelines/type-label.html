<!-- @dsCard group="Type" viewport="700x180" name="Labels & metadata" subtitle="Small-caps eyebrows + old-style figure dates" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 26px 32px; display: flex; flex-direction: column; gap: 18px; }
  .label { font-family: var(--font-label); font-variant: small-caps; font-weight: 600; letter-spacing: var(--tracking-label); font-size: var(--fs-label); color: var(--text-muted); }
  .meta { font-family: var(--font-serif); font-feature-settings: 'onum' 1; letter-spacing: .02em; font-size: var(--fs-fine); color: var(--text-faint); }
  .pair { display: flex; align-items: baseline; justify-content: space-between; border-top: var(--border-hair); padding-top: 8px; }
</style>
</head>
<body>
  <div class="label">Education</div>
  <div class="pair">
    <span class="label" style="color:var(--text-strong)">Royal College of Art</span>
    <span class="meta">1998 – 2002 · London</span>
  </div>
</body>
</html>
