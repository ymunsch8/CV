<!-- @dsCard group="Colors" viewport="700x150" name="Paper stock" subtitle="Warm aged cream — page surfaces" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-sunken); padding: 22px 24px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: var(--radius-1); border: 1px solid rgba(31,26,18,.12); box-shadow: var(--shadow-raise); }
  .nm { font-family: var(--font-serif); font-variant: small-caps; letter-spacing: .08em; font-size: .8rem; color: var(--text-body); margin-top: 8px; }
  .hex { font-family: var(--font-serif); font-feature-settings:'onum' 1; font-size: .72rem; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--paper-0)"></div><div class="nm">paper-0</div><div class="hex">#faf6ec</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-1)"></div><div class="nm">paper-1</div><div class="hex">#f4ecd9</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-2)"></div><div class="nm">paper-2</div><div class="hex">#ece1c8</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-3)"></div><div class="nm">paper-3</div><div class="hex">#e2d4b6</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-edge)"></div><div class="nm">edge</div><div class="hex">#d8c8a4</div></div>
  </div>
</body>
</html>
