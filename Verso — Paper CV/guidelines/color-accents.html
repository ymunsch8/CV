<!-- @dsCard group="Colors" viewport="700x180" name="Press accents" subtitle="Three inks — oxblood (default), navy, forest" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 22px 24px; }
  .grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 18px; }
  .col .bar { display: flex; gap: 6px; }
  .chip { height: 56px; flex: 1; border-radius: var(--radius-1); }
  .nm { font-family: var(--font-serif); font-variant: small-caps; letter-spacing: .1em; font-size: .82rem; color: var(--text-strong); margin-top: 8px; }
  .use { font-family: var(--font-serif); font-style: italic; font-size: .78rem; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="grid">
    <div class="col">
      <div class="bar"><div class="chip" style="background:var(--oxblood-700)"></div><div class="chip" style="background:var(--oxblood-600)"></div><div class="chip" style="background:var(--oxblood-500)"></div></div>
      <div class="nm">Oxblood</div><div class="use">default press</div>
    </div>
    <div class="col">
      <div class="bar"><div class="chip" style="background:var(--navy-700)"></div><div class="chip" style="background:var(--navy-600)"></div><div class="chip" style="background:var(--navy-500)"></div></div>
      <div class="nm">Navy</div><div class="use">.ink-navy</div>
    </div>
    <div class="col">
      <div class="bar"><div class="chip" style="background:var(--forest-700)"></div><div class="chip" style="background:var(--forest-600)"></div><div class="chip" style="background:var(--forest-500)"></div></div>
      <div class="nm">Forest</div><div class="use">.ink-forest</div>
    </div>
  </div>
</body>
</html>
