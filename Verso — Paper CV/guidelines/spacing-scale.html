<!-- @dsCard group="Spacing" viewport="700x220" name="Spacing scale" subtitle="4px base · space-1 → space-8" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 22px 28px; }
  .row { display: flex; align-items: center; gap: 14px; margin-bottom: 9px; }
  .nm { font-family: var(--font-serif); font-variant: small-caps; letter-spacing: .06em; font-size: .8rem; color: var(--text-muted); width: 92px; flex: none; }
  .bar { height: 14px; background: var(--accent); border-radius: 1px; }
  .px { font-family: var(--font-serif); font-feature-settings:'onum' 1; font-size: .76rem; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row"><span class="nm">space-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row"><span class="nm">space-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="nm">space-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row"><span class="nm">space-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row"><span class="nm">space-5</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
  <div class="row"><span class="nm">space-6</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
  <div class="row"><span class="nm">space-7</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
  <div class="row"><span class="nm">space-8</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
</body>
</html>
